[workspace]
name = "roboracer"
channels = ["robostack-humble", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
ros-humble-desktop = ">=0.10.0,<0.11"
colcon-common-extensions = ">=0.3.0,<0.4"
setuptools = "<=58.2.0"
ros-humble-tf-transformations = ">=1.0.1,<2"
vcstool = "*"

# --- BEGIN AUTO-GENERATED DEPS (do not edit manually) ---
# Generated by: python3 pixi_generate_deps.py

# Python
jinja2 = "*"
jsonschema = "*"
pyyaml = "*"

# ROS packages
ros-humble-ament-cmake = "*"
ros-humble-ament-cmake-auto = "*"
ros-humble-ament-cmake-core = "*"
ros-humble-ament-cmake-python = "*"
ros-humble-ament-index-python = "*"
ros-humble-example-interfaces = "*"
ros-humble-generate-parameter-library = "*"
ros-humble-geometry-msgs = "*"
ros-humble-lifecycle-msgs = "*"
ros-humble-message-filters = "*"
ros-humble-rclcpp = "*"
ros-humble-rclcpp-action = "*"
ros-humble-rclcpp-components = "*"
ros-humble-rclcpp-lifecycle = "*"
ros-humble-rclpy = "*"
ros-humble-rosidl-default-generators = "*"
ros-humble-rosidl-default-runtime = "*"
ros-humble-std-msgs = "*"
ros-humble-std-srvs = "*"
ros-humble-tf2-ros = "*"
# --- END AUTO-GENERATED DEPS ---

[pypi-dependencies]
eventlet = "==0.33.3"
Flask = "==1.1.1"
Flask-SocketIO = "==4.1.0"
python-socketio = "==4.2.0"
python-engineio = "==3.13.0"
greenlet = ">=2.0"
gevent = ">=22.10"
gevent-websocket = "==0.10.1"
itsdangerous = "==2.0.1"
werkzeug = "==2.0.3"
attrdict3 = "==2.0.2"
opencv-contrib-python = "==4.10.0.84"
transforms3d = "==0.4.2"

[target.unix.activation]
scripts = ["scripts/pixi_activate.bash", "install/setup.bash"]

[tasks]
_fetch_sim = "bash scripts/fetch_sim.sh"
sim = { cmd = "'./.sim/autodrive_simulator/AutoDRIVE Simulator.x86_64'", depends-on = ["_fetch_sim"] }
import = "mkdir -p src/deps && vcs import src/deps < src/dependencies.repos"
update_python_paths = "python3 .vscode/update_python_paths.py"
_colcon_build = "colcon build"
_colcon_build_sequential = "colcon build --executor sequential"
build = { depends-on = ["_colcon_build", "update_python_paths"] }
build_sequential = { depends-on = ["_colcon_build_sequential", "update_python_paths"] }
test = "colcon test"
clean = "rm -rf build install log"
_breadcrumb_graph = "breadcrumb src/racer/launch/racer.launch.py -o docs/ros_graph/graph.dot --graph-type grouped_and_full_system"
_dot_to_svg = "bash -c 'for f in docs/ros_graph/*.dot; do dot -Tsvg \"$f\" -o \"${f%.dot}.svg\"; done'"
update_ros_graph_diagram = { depends-on = ["_breadcrumb_graph", "_dot_to_svg"] }
